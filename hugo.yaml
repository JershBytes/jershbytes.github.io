title: Joshua Ross
paginate: 5
theme: [PaperModX]


enableInlineShortcodes: true
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
enableEmoji: true

params:
  description: "Theme PaperModX - https://github.com/reorx/hugo-PaperModX"
  author:
    - Joshua Ross
  mainSections:
    - docs
    - posts
  disableAnchoredHeadings: true
  images: ["cover.png"]
  DateFormat: "2006-01-02"
  useCustomAnalytics: true

  defaultTheme: auto
  # disableThemeToggle: true
  ShowShareButtons: true
  ShowReadingTime: true
  ShowWordCount: false
  # disableSpecial1stPost: true
  displayFullLangName: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowToc: false
  TocOpen: true
  TocSide: "right"
  EnableInstantClick: true
  EnableImageZoom: true


  profileMode:
    enabled: true
    title: Joshua Ross
    imageUrl: /img/me.jpg
    # imageTitle: my image
    # imageWidth: 120
    # imageHeight: 120
    subtitle: ☁️ DevOps Nerd
    buttons:
      - name: About Me
        url: about
      - name: Blog
        url: posts
      - name: Resume
        url: resume

  socialIcons:
    - name: github-simple
      url: "https://github.com/coloredbytes/"
    - name: rss-simple
      url: "index.xml"

minify:
  disableXML: true
  # minifyOutput: true

outputs:
  home:
    - HTML
    - RSS
    - JSON

taxonomies:
  category: categories
  tag: tags
  series: series

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    style: dracula
    lineNos: false
    noClasses: true
